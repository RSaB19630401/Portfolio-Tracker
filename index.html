// ─── Persistent Storage Helper ───
const Storage = {
  async get(key) {
    try {
      const v = localStorage.getItem("pt_" + key);
      return v ? JSON.parse(v) : null;
    } catch {
      return null;
    }
  },
  async set(key, val) {
    try {
      localStorage.setItem("pt_" + key, JSON.stringify(val));
    } catch (e) {
      console.error("Storage error:", e);
    }
  }
};

  EUR: 1,

  HKD: 0.118,

let liveFxRates = {
  ...FX_RATES

const toEUR = (amount, currency) => amount * (liveFxRates[currency] || FX_RATES[currency] || 1);
const fmtEUR = n => n != null ? n.toLocaleString("de-DE", {
  style: "currency",
  currency: "EUR"
}) : "–";

// ─── Live Data Config ───

const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min auto-refresh
const isMarketOpen = () => {
  const now = new Date();
  const h = now.getUTCHours();
  const d = now.getUTCDay();
  if (d === 0 || d === 6) return false;
  // Xetra 07:00-17:30 UTC, US 13:30-20:00 UTC → combined 07:00-20:00
  return h >= 7 && h < 20;
};

// Yahoo-compatible tickers (skip WKN-only funds, bonds, delisted)
const isYahooTicker = ticker => {
  if (!ticker) return false;
  // Skip WKN-only format (6+ digit WKN.DE) that Yahoo doesn't recognize
  if (/^\d{6}\.DE$/.test(ticker)) return false;
  if (/^[A-Z0-9]{5,}\.DE$/.test(ticker) && !ticker.match(/^(ASWC|DFEN|VWCE|EUNL|EXSA|EXS1|IS3N|IWDA|GOAI|ROBO)\.DE/i)) {
    // Allow known ETF tickers, block WKN-based tickers
    if (/^(DWS|A[0-9]|DB9|ETFL|ZZRA|FOND)/.test(ticker)) return false;
  }
  if (ticker.includes("IBM2")) return false; // alt WKN duplicate
  return true;
};

const getRegion = (ticker, currency) => {
  if (currency === "JPY") return "Japan";
  if (currency === "HKD") return "China/HK";
  if (currency === "CHF") return "Schweiz";
  if (currency === "GBP") return "UK";
  if (currency === "NOK") return "Norwegen";
  if (currency === "CAD") return "Kanada";
  if (currency === "SEK") return "Schweden";
  if (currency === "USD" || !ticker.includes(".") && !ticker.match(/^\d/)) return "USA";
  if (ticker.endsWith(".DE")) return "Deutschland";
  if (ticker.endsWith(".PA")) return "Frankreich";
  if (ticker.endsWith(".AS")) return "Niederlande";
  return "Europa";
};

    d.setDate(d.getDate() - i);

    data.push({
      date: d.toISOString().split("T")[0],
      close: +p.toFixed(2)

  }
  return data;
}
